services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: nestjs-backend-template:latest
    container_name: nestjs_template_server
    profiles: [prod]
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    container_name: nestjs_template_db
    restart: always
    profiles: [prod, dev]
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-setup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs_template_db_setup
    profiles: [dev]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - app_network
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    command: >
      bash -c "
        echo '🚀 Running DB setup...';
        npx prisma generate;
        npx prisma db push --accept-data-loss;
        npx ts-node prisma/seeds/index.ts 2>/dev/null || echo '⚠️  No seed file found, skipping.';
        echo '✅ DB setup complete!';
      "

volumes:
  pgdata:

networks:
  app_network:
    driver: bridge
